meta:
  derived_from: "TOOLS.md"
  role: "eslik eden ozet"
  update_rule: "Davranis degistiren guncelleme once TOOLS.md tarafinda yapilir"

tools:
  web:
    purpose: "Tanitim sitesi ve admin / ic operasyon yuzeyleri"
    default_stack: ["Next.js"]
    use_when:
      - "admin ve ic operasyon ekranlari"
      - "prompt uretimi yuzeyi"
      - "dokuman ve baglam akisi"
      - "is akisi gorunurlugu"

  database:
    purpose: "Operasyonel kayitlarin tutulmasi"
    default_stack: ["Postgres", "Prisma"]
    use_when:
      - "businesses"
      - "audits"
      - "offers"
      - "delivery_projects"
      - "durumu degisen operasyonel is nesneleri"

  docs:
    purpose: "Sabit baglam ve yasayan proje kayitlari"
    default_stack: ["Markdown", "YAML", "JSON"]
    use_when:
      - "project"
      - "roadmap"
      - "heartbeat"
      - "memory"
      - "decisions"
      - "checklists"
      - "playbooks"
      - "sabit prompt baglami"

  automation:
    purpose: "Kucuk tekrar eden isleri azaltmak"
    default_stack: ["cron", "basit jobs"]
    use_when:
      - "ayni is tekrar etmeye basladiysa"
      - "elle takip hata doguruyorsa"
      - "kucuk ve anlasilir otomasyon yeterliyse"

rules:
  - "Once mevcut stack icinde cozum ara"
  - "Sirf ileride lazim olabilir diye yeni servis ekleme"
  - "MVP'de agir altyapi degil, gorunur sonuc onceliklidir"
  - "Operasyonel veri ile kalici baglam birbirine karistirilmaz"
  - "Parola, token ve benzeri gizli bilgiler workspace'e yazilmaz"
  - "Kesif ve veri toplama tarafinda tek araca baglanilmaz; ihtiyaca gore uygun servis secilir"
