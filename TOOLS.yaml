tools:
  web:
    purpose: "Tanitim sitesi, admin panel ve ic operasyon ekranlari"
    default_stack: ["Next.js"]
    use_when:
      - "dashboard ve admin ekranlari"
      - "context center"
      - "consultation center"
      - "is akisi gorunurlugu"

  database:
    purpose: "Operasyonel kayitlarin tutulmasi"
    default_stack: ["Postgres", "Prisma"]
    use_when:
      - "businesses"
      - "audits"
      - "offers"
      - "delivery_projects"
      - "durumu degisen is nesneleri"

  docs:
    purpose: "Sabit baglam ve yasayan proje kayitlari"
    default_stack: ["Markdown", "YAML", "JSON"]
    use_when:
      - "project context"
      - "roadmap"
      - "heartbeat"
      - "memory"
      - "decisions"
      - "playbooks"
      - "prompt uretim baglami"

  automation:
    purpose: "Kucuk tekrar eden isleri azaltmak"
    default_stack: ["cron", "basit jobs"]
    use_when:
      - "health checks"
      - "kucuk takip gorevleri"
      - "duzenli kontrol isleri"

rules:
  - "MVP'de vector DB, event bus ve mikroservis onerilmez"
  - "Tum baglam her prompta kor bicimde tasinmaz"
  - "Once en kucuk calisan akis kurulur"
  - "Operasyonel veri ile kalici baglam birbirine karistirilmaz"
  - "Parola, token ve benzeri gizli bilgiler workspace'e yazilmaz"
